services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"

  web:
    build: .
    env_file: .env
    environment:
      CONTENT_SERVICE_HOST: content-service
      CONTENT_SERVICE_PORT: 50051
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - static_data:/vol/static
      - ./www.youtube.com_cookies.txt:/app/www.youtube.com_cookies.txt:ro
    depends_on:
      - content-service
      - redis

  celery-worker:
    build: .
    env_file: .env
    environment:
      CONTENT_SERVICE_HOST: content-service
      CONTENT_SERVICE_PORT: 50051
      REDIS_URL: redis://redis:6379/0
    command:
      - celery
      - -A
      - notetube
      - worker
      - --loglevel=info
      - --concurrency=2
      - --chdir
      - /app/Backend
    volumes:
      - ./www.youtube.com_cookies.txt:/app/www.youtube.com_cookies.txt:ro
    depends_on:
      - redis
      - content-service

  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    environment:
      CONTENT_SERVICE_PORT: 50051
      LOG_LEVEL: INFO
    expose:
      - "50051"

  nginx:
    image: nginx:alpine
    command: >
      /bin/sh -c '
        while :; do
          if [ -f /var/www/certbot/.renewed ]; then
            rm /var/www/certbot/.renewed;
            nginx -s reload;
          fi;
          sleep 1m & wait $${!};
        done &
        nginx -g "daemon off;"
      '
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/vol/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --deploy-hook \"touch /var/www/certbot/.renewed\"; sleep 12h & wait $${!}; done;'"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot

volumes:
  static_data:

# docker compose up --build : for rebuilds can add -d for no logs
# docker compose up -d : doesnt force rebuild and runs in background
# docker compose down
